    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter" error in some browser/iframe environments
      (function() {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch:", e);
        }
      })();
    </script>
